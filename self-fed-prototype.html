<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#E8E5DE">
<title>Self-Fed — Love Church</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#E8E5DE;
    --cream-2:#DDD9D0;
    --ink:#0A0A0A;
    --ink-2:#2A2A2A;
    --muted:#7A746B;
    --pink:#EC2F8A;
    --pink-2:#FF4DA0;
    --white:#FFFFFF;
    --border:#CFCAC0;
    --good:#1A8F4A;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:#1c1c1e;font-family:'Inter',sans-serif;color:var(--ink);overscroll-behavior:none}
  body{display:flex;align-items:center;justify-content:center;padding:24px;min-height:100vh}

  /* Phone frame for desktop preview */
  .phone-frame{
    width:390px;height:844px;background:var(--cream);
    border-radius:48px;
    box-shadow:0 0 0 12px #111, 0 0 0 14px #333, 0 30px 80px rgba(0,0,0,.5);
    position:relative;overflow:hidden;
    display:flex;flex-direction:column;
  }
  .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:120px;height:28px;background:#000;border-radius:16px;z-index:50}

  @media (max-width:480px){
    body{padding:0;background:var(--cream)}
    .phone-frame{width:100vw;height:100vh;border-radius:0;box-shadow:none}
    .notch{display:none}
  }

  .screen{flex:1;display:flex;flex-direction:column;padding-top:44px;overflow:hidden}
  .scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 20px 100px}
  .scroll::-webkit-scrollbar{display:none}

  /* TYPOGRAPHY */
  .display{font-family:'Anton',sans-serif;letter-spacing:-0.01em;line-height:0.88;text-transform:uppercase}
  .h1{font-family:'Anton',sans-serif;font-size:46px;line-height:0.92;text-transform:uppercase;letter-spacing:-0.005em}
  .h2{font-family:'Anton',sans-serif;font-size:30px;line-height:0.95;text-transform:uppercase}
  .h3{font-family:'Inter',sans-serif;font-weight:800;font-size:18px;letter-spacing:-0.01em}
  .eyebrow{font-family:'Inter',sans-serif;font-weight:700;font-size:10px;letter-spacing:0.16em;text-transform:uppercase;color:var(--ink)}
  .label{font-family:'Inter',sans-serif;font-weight:600;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted)}
  .body{font-size:14px;line-height:1.5;color:var(--ink-2)}
  .small{font-size:12px;color:var(--muted)}

  /* HEADER */
  .topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 20px 12px;background:var(--cream)}
  .topbar .date{font-weight:700;font-size:13px;color:var(--ink)}
  .streak{display:flex;align-items:center;gap:6px;background:#000;color:var(--cream);padding:6px 10px;border-radius:999px;font-size:11px;font-weight:700}
  .streak .dot{width:6px;height:6px;border-radius:50%;background:var(--pink);box-shadow:0 0 0 3px rgba(236,47,138,.25)}

  /* CARDS */
  .card{background:var(--white);border:1px solid var(--border);border-radius:24px;padding:20px}
  .card-dark{background:var(--ink);color:var(--cream);border-radius:24px;padding:20px;border:none}
  .card-pink{background:var(--pink);color:var(--white);border-radius:24px;padding:20px;border:none}

  /* PILLARS BAR */
  .pillars{display:flex;gap:8px;margin:16px 0 6px}
  .pillar{flex:1;background:var(--cream-2);border:1px solid var(--border);border-radius:14px;padding:10px 8px;text-align:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);position:relative;transition:all .15s}
  .pillar.active{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .pillar.done{background:var(--pink);color:var(--white);border-color:var(--pink)}
  .pillar .n{display:block;font-size:9px;opacity:.6;margin-bottom:2px}

  /* BUTTONS */
  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;font-size:14px;border-radius:999px;padding:14px 20px;width:100%;transition:transform .1s, background .15s}
  .btn:active{transform:scale(0.98)}
  .btn-primary{background:var(--ink);color:var(--cream)}
  .btn-pink{background:var(--pink);color:var(--white)}
  .btn-outline{background:transparent;border:1.5px solid var(--ink);color:var(--ink)}
  .btn-ghost{background:transparent;color:var(--ink);font-weight:600}
  .btn-sm{padding:9px 14px;font-size:12px}
  .btn:disabled{opacity:.5;cursor:default}

  /* GRID */
  .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
  .quick{background:var(--white);border:1px solid var(--border);border-radius:18px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .15s}
  .quick:active{transform:scale(0.97)}
  .quick.done{background:var(--pink);color:var(--white);border-color:var(--pink)}
  .quick .ico{font-size:22px;margin-bottom:6px}
  .quick .lbl{font-size:11px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}

  /* WEEK STRIP */
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
  .wd{aspect-ratio:1/1.4;border-radius:12px;background:var(--white);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-weight:700}
  .wd .d{font-size:9px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
  .wd .n{font-size:16px;margin-top:2px}
  .wd.today{background:var(--ink);color:var(--cream);border-color:var(--ink)}
  .wd.today .d{color:var(--cream)}
  .wd.done{background:var(--pink);color:var(--white);border-color:var(--pink)}
  .wd.done .d{color:var(--white)}

  /* VIDEO PLACEHOLDER */
  .video{position:relative;background:linear-gradient(135deg,#1a1a1a,#3a3a3a);aspect-ratio:16/9;border-radius:18px;overflow:hidden;cursor:pointer}
  .video::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at center, rgba(236,47,138,.4) 0%, transparent 50%)}
  .video .play{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:60px;height:60px;background:var(--white);border-radius:50%;display:flex;align-items:center;justify-content:center}
  .video .play::after{content:'';border-style:solid;border-width:11px 0 11px 18px;border-color:transparent transparent transparent var(--ink);margin-left:4px}
  .video .meta{position:absolute;left:14px;bottom:14px;right:14px;color:var(--white);z-index:1}
  .video .meta .who{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.8;margin-bottom:2px}
  .video .meta .title{font-family:'Anton',sans-serif;font-size:22px;line-height:1;text-transform:uppercase}

  /* BOTTOM NAV */
  .nav{position:absolute;left:0;right:0;bottom:0;height:78px;background:rgba(232,229,222,0.92);backdrop-filter:blur(14px);border-top:1px solid var(--border);display:flex;justify-content:space-around;align-items:center;padding-bottom:14px;z-index:30}
  .navbtn{flex:1;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
  .navbtn.active{color:var(--ink)}
  .navbtn.active .navico{color:var(--pink)}
  .navico{font-size:20px;line-height:1}

  /* PROGRESS RING */
  .ring{position:relative;width:64px;height:64px}
  .ring svg{transform:rotate(-90deg)}
  .ring .ringval{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px}

  /* INPUTS */
  textarea,input{font-family:'Inter',sans-serif;font-size:14px;color:var(--ink);background:var(--white);border:1px solid var(--border);border-radius:14px;padding:14px;width:100%;outline:none;resize:none}
  textarea:focus,input:focus{border-color:var(--ink)}

  /* LIST */
  .row{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row .left{display:flex;align-items:center;gap:12px}
  .row .av{width:34px;height:34px;border-radius:50%;background:var(--pink);color:var(--white);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px}

  /* PRINT FRIENDLY (for study guide export) */
  .guide-section{margin-bottom:18px}
  .q{padding:14px;border-left:3px solid var(--pink);background:var(--white);border-radius:0 10px 10px 0;margin-bottom:8px;font-size:13px;line-height:1.5}

  /* MISC */
  .center{text-align:center}
  .mt-4{margin-top:16px}.mt-6{margin-top:24px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}
  .mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.mb-6{margin-bottom:24px}
  .gap-2{gap:8px}.gap-3{gap:12px}
  .flex{display:flex}.between{justify-content:space-between}.aic{align-items:center}.col{flex-direction:column}
  .pill{display:inline-block;padding:4px 10px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:var(--cream-2);color:var(--ink-2)}
  .pill.pink{background:var(--pink);color:var(--white)}
  .pill.ink{background:var(--ink);color:var(--cream)}
  .badge-circle{width:88px;height:88px;border-radius:50%;background:var(--pink);color:var(--white);display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;font-size:9px;font-weight:700;text-align:center;letter-spacing:.12em;text-transform:uppercase;padding:8px;line-height:1.2;transform:rotate(-8deg);position:relative}
  .arrow-down{display:inline-block;margin-top:2px;font-size:14px}
  hr.dash{border:none;border-top:1px dashed var(--border);margin:16px 0}

  /* DESKTOP SIDE INFO */
  .side-info{position:fixed;left:24px;top:24px;color:#999;max-width:240px;font-size:12px;line-height:1.6}
  .side-info h2{font-family:'Anton',sans-serif;font-size:34px;color:#fff;letter-spacing:-.01em;line-height:.9;margin-bottom:8px;text-transform:uppercase}
  .side-info .tag{display:inline-block;background:#EC2F8A;color:#fff;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
  .side-info p{margin-bottom:10px}
  .side-info button{background:#222;color:#fff;border:1px solid #444;padding:8px 14px;border-radius:8px;cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;margin-top:8px;width:100%}
  .side-info button:hover{background:#333}
  @media (max-width:900px){.side-info{display:none}}

  /* HIDE inactive screens */
  .hidden{display:none !important}

  /* CALENDAR */
  .cal{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .cal .h{font-size:9px;font-weight:700;color:var(--muted);text-align:center;padding:6px 0;letter-spacing:.08em;text-transform:uppercase}
  .cal .d{aspect-ratio:1/1;border-radius:8px;background:var(--cream-2);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid transparent}
  .cal .d.done{background:var(--pink);color:var(--white)}
  .cal .d.today{border-color:var(--ink);background:var(--ink);color:var(--cream)}
  .cal .d.future{background:transparent;color:var(--muted);border:1px solid var(--border)}
  .cal .d.empty{visibility:hidden}

  .month-nav{display:flex;justify-content:space-between;align-items:center;padding:8px 0 14px}
  .month-nav button{background:none;border:1px solid var(--border);border-radius:50%;width:34px;height:34px;font-size:18px;cursor:pointer;color:var(--ink);background:var(--white)}

  /* SCROLLABLE READING TEXT */
  .verse{font-size:15px;line-height:1.65;color:var(--ink-2);margin-bottom:14px}
  .verse .num{color:var(--pink);font-weight:800;margin-right:6px;font-size:11px;vertical-align:top}

  /* AUTH */
  .auth-wrap{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:60px 28px 100px;background:var(--cream)}
  .auth-buttons{display:flex;flex-direction:column;gap:10px}
  .btn-apple{background:#000;color:#fff}
  .btn-google{background:#fff;color:#0A0A0A;border:1px solid var(--border)}

  /* STUDY GUIDE */
  .guide{background:var(--white);border-radius:20px;padding:22px;border:1px solid var(--border)}
  .guide h1{font-family:'Anton',sans-serif;font-size:30px;text-transform:uppercase;line-height:1;margin-bottom:6px}
  .guide h4{font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--pink);margin-bottom:14px}
  .guide h5{font-family:'Anton',sans-serif;font-size:16px;text-transform:uppercase;margin:18px 0 8px;letter-spacing:.02em}
  .guide p{font-size:13px;line-height:1.55;color:var(--ink-2);margin-bottom:8px}
</style>
</head>

// Helpers
function findReading(iso){ return READINGS.find(r => r.iso === iso); }
function bookOf(passage){
  const m = passage.match(/^(\d?\s?[A-Za-z ]+?)\s+\d/);
  return m ? m[1].trim() : passage.split(' ')[0];
}
function promptFor(reading){
  const b = bookOf(reading.p);
  return PROMPTS[b] || PROMPTS[bookOf(reading.s)] || "What stood out to you? Where is God speaking?";
}
function prayerFor(reading){
  const b = bookOf(reading.p);
  if (b.includes("Psalm")) return PRAY["Psalm"];
  return PRAY["default"];
}
function videoFor(iso){
  return VIDEOS[iso] || {who:"Love Church Teaching Team", title:"Devotional for "+iso, len:"5:00"};
}
function shortDay(iso){
  const d = new Date(iso+"T12:00:00");
  return d.toLocaleDateString('en-US',{weekday:'short', month:'short', day:'numeric'});
}
function longDay(iso){
  const d = new Date(iso+"T12:00:00");
  return d.toLocaleDateString('en-US',{weekday:'long', month:'long', day:'numeric', year:'numeric'});
}
function isoOffset(iso, days){
  const d = new Date(iso+"T12:00:00");
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function startOfWeek(iso){
  const d = new Date(iso+"T12:00:00");
  const day = d.getDay(); // 0=Sun
  const diff = day === 0 ? -6 : 1 - day; // make Monday week-start
  d.setDate(d.getDate()+diff);
  return d.toISOString().slice(0,10);
}
function isComplete(iso){
  const c = state.completed[iso];
  if (!c) return false;
  return c.read && c.watch && c.journal && c.pray;
}
function pctYear(){
  const total = 365;
  const done = Object.keys(state.completed).filter(isComplete).length;
  return Math.round((done/total)*100);
}

// NAV
function go(view, opts){
  state.view = view;
  if (opts && opts.date) state.activeDate = opts.date;
  render();
}
function toggleRole(){
  state.role = state.role === "member" ? "leader" : "member";
  state.viewWeek = startOfWeek(state.today);
  state.view = state.role === "leader" ? "groups" : "today";

}

  state.completed = {};
  state.journal = {};
  state.streak = 0;

  state.streak = 12;
  render();
}

}

function ringSvg(pct){
  const r=28, c=2*Math.PI*r;

  return `<svg width="64" height="64">
    <circle cx="32" cy="32" r="${r}" stroke="#DDD9D0" stroke-width="6" fill="none"/>
    <circle cx="32" cy="32" r="${r}" stroke="#EC2F8A" stroke-width="6" fill="none" stroke-linecap="round" stroke-dasharray="${c}" stroke-dashoffset="${off}"/>
  </svg>`;
}

function weekStrip(){
  const monday = startOfWeek(state.today);
  const labels = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  let html = `<div class="week">`;
  for (let i=0;i<7;i++){

    const d = new Date(iso+"T12:00:00");
    const isToday = iso === state.today;
    const done = isComplete(iso);
    html += `<div class="wd ${isToday?'today':''} ${done?'done':''}" onclick="go('day',{date:'${iso}'})">
      <div class="d">${labels[i]}</div>
      <div class="n">${d.getDate()}</div>
    </div>`;
  }
  html += `</div>`;
  return html;
}

function screenPlan(){

  const days = new Date(year, month, 0).getDate();

  const monthName = new Date(year,month-1,1).toLocaleString('en-US',{month:'long'});

  let cells = '';
  // Header
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(h=>cells+=`<div class="h">${h}</div>`);
  // Empties before first day (Mon-week)
  const shift = firstDow === 0 ? 6 : firstDow - 1;
  for (let i=0;i<shift;i++) cells += `<div class="d empty"></div>`;
  for (let d=1; d<=days; d++){
    const iso = `2026-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const done = isComplete(iso);

function buildWeekGuide(mondayParam){
  const monday = mondayParam || startOfWeek(state.today);
  const weekDays = [];
  for (let i=0;i<7;i++){
    const iso = isoOffset(monday,i);
    const r = findReading(iso);
    if (r) weekDays.push(r);
  }
  if (weekDays.length === 0) return null;

  // Pull first primary book this week as theme
  const themeBook = bookOf(weekDays[0].p);

  return {
    monday: monday,
    weekRange: `${shortDay(monday)} – ${shortDay(isoOffset(monday,6))}`,
    days: weekDays,
    theme: themeBook,
    sermon: SERMONS[monday] || null,
    openingQ: `Before we open the Word together: where did God meet you in ${themeBook} this week?`,
    keyVerse: `${weekDays[3] ? weekDays[3].p : weekDays[0].p}`,
    questions: [
      `What did you read this week that you couldn't unsee?`,
      `Where is God's character most visible in ${themeBook}? Where is it hardest to see?`,
      `Pick one verse from this week's reading. Why that one?`,
      `Where in your life is this reading exposing something? Name it specifically.`,
      `What is one obedience step you take in the next 7 days because of what you read?`,
      `Who needs to hear what God said to you this week?`
    ],
    application: `Before you leave tonight, name your one obedience step. Text someone in this group between now and Sunday with how it went.`,
    prayer: `Father, we are not consumers of Your Word. We are doers. Send us this week with what we just received. In Jesus' name.`,
  };
}

    case 'journal': html = screenJournal(); break;

    case 'pray': html = screenPray(); break;
    case 'day': html = screenDay(); break;

    case 'leader-dash': state.view = 'groups'; html = screenGroups(); break;

    default: html = screenToday();
  }
  app.innerHTML = html;
  app.scrollTop = 0;
}

// Start
render();
</script>
</body>
